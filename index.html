<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亮剑组 · 调休安排表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
header h1{font-size:17px;font-weight:700}
header .info{font-size:11px;background:rgba(255,255,255,.15);padding:3px 12px;border-radius:20px;display:flex;gap:10px}
header .btns{display:flex;gap:4px}
header .btns button{font-size:11px;padding:3px 8px;border:none;border-radius:5px;cursor:pointer;background:rgba(255,255,255,.2);color:#fff}
header .btns button:hover{background:rgba(255,255,255,.35)}
.main{padding:12px 16px;max-width:1400px;margin:0 auto}
.nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.nav button{width:28px;height:28px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;font-size:13px;cursor:pointer}
.nav button:hover{border-color:#2563eb;color:#2563eb}
.nav .title{font-size:16px;font-weight:700;min-width:140px;text-align:center}
.nav .title .tbtn{font-size:10px;color:#2563eb;cursor:pointer;margin-left:5px;padding:1px 6px;border-radius:3px;background:#eff6ff;border:none}
.hint{text-align:center;font-size:12px;color:#64748b;margin-bottom:8px;padding:4px;background:#f8fafc;border-radius:6px;min-height:24px}
.cal{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:10px;overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:520px}
th{padding:4px;font-size:11px;font-weight:600;color:#64748b;text-align:center;border-bottom:2px solid #e2e8f0}
th.mon{color:#ef4444}
th.mon small{display:block;font-weight:400;font-size:9px;color:#fca5a5}
th.wk{color:#10b981}
td{border:1px solid #f1f5f9;vertical-align:top;padding:0;position:relative;height:70px}
td.om{background:#fafafa}
.cell{padding:2px 4px;height:100%;position:relative;cursor:default}
.cell.ok{cursor:pointer}
.cell.ok:hover{background:#eff6ff}
.cell.dis{background:#f8fafc;cursor:not-allowed;opacity:.5}
.dt{font-size:11px;font-weight:600;color:#334155;margin-bottom:1px}
.nw{display:flex;flex-wrap:wrap;gap:1px}
.nt{font-size:10px;padding:0 4px;border-radius:3px;color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.7}
.cb{position:absolute;bottom:2px;right:2px;font-size:9px;font-weight:700;color:#94a3b8;background:#f1f5f9;border-radius:3px;padding:0 4px}
.cb.f{background:#fef3c7;color:#d97706}
.ad{position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%}
.mt{color:#ef4444;font-size:10px;font-weight:600;padding-top:3px;text-align:center}
.ft{margin-top:10px;display:flex;flex-wrap:wrap;gap:10px}
.bp{flex:1;min-width:260px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:10px 12px}
.pt{font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.pb{display:flex;flex-wrap:wrap;gap:4px}
.pc{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:16px;cursor:pointer;border:2px solid transparent;background:#f8fafc;font-size:12px}
.pc:hover{background:#f1f5f9}
.pc.act{border-color:var(--c);background:#eff6ff;font-weight:600}
.pc .d{width:8px;height:8px;border-radius:50%}
.pc .n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px}
.pc .l{font-size:9px;color:#94a3b8}
.pc .x{font-size:11px;color:#cbd5e1;cursor:pointer;padding:0 2px}
.pc .x:hover{color:#ef4444}
.eb{color:#94a3b8;font-size:12px;padding:4px 0}
.ch{display:flex;align-items:center;gap:4px;cursor:pointer;color:#475569;font-size:12px;font-weight:600;margin-bottom:6px}
.ch:hover{color:#2563eb}
.ch .ar{transition:transform .2s;font-size:9px}
.ch .ar.op{transform:rotate(90deg)}
.cb2{display:none;padding-top:6px}
.cb2.op{display:block}
.ar2{display:flex;gap:6px}
.ar2 input{flex:1;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.ar2 input:focus{border-color:#2563eb}
.ar2 button{padding:6px 16px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.ar2 button:hover{background:#1d4ed8}
.tip{position:fixed;z-index:999;background:#1e293b;color:#fff;padding:4px 8px;border-radius:5px;font-size:11px;pointer-events:none;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.2);display:none}
@media(max-width:768px){.main{padding:8px}.bp{min-width:auto}header h1{font-size:14px}}
@media print{header{-webkit-print-color-adjust:exact;print-color-adjust:exact}.nav button,.hint,.ft{display:none!important}}
</style>
</head>
<body>

<header>
  <h1>亮剑组 · 调休安排表</h1>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <div class="info"><span>周一禁休</span><span>上限3人</span></div>
    <div class="btns">
      <button onclick="shareData()">📤 分享</button>
      <button onclick="importData()">📥 导入</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="nav">
    <button onclick="goMonth(-1)">◀</button>
    <div class="title"><span id="mt"></span><button class="tbtn" onclick="goToday()">今天</button></div>
    <button onclick="goMonth(1)">▶</button>
  </div>
  <div class="hint" id="hint"></div>
  <div class="cal"><table><thead><tr>
    <th class="mon">一<small>禁休</small></th><th>二</th><th>三</th><th>四</th><th>五</th><th class="wk">六</th><th class="wk">日</th>
  </tr></thead><tbody id="calb"></tbody></table></div>
  <div class="ft">
    <div class="bp">
      <div class="pt">👥 成员 <span id="pcnt"></span></div>
      <div class="pb" id="pbar"></div>
    </div>
    <div class="bp" style="flex:0 0 240px;min-width:200px">
      <div class="ch" onclick="toggleAdd()">
        <span class="ar" id="addar">▶</span> + 添加成员
      </div>
      <div class="cb2" id="addbox">
        <div class="ar2">
          <input type="text" id="pi" placeholder="输入姓名" maxlength="20" onkeydown="if(event.key==='Enter')addPerson()">
          <button onclick="addPerson()">添加</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="tip" id="tip"></div>

<script>
var KEY='liangjian_leave';
var COLS=['#2563eb','#dc2626','#059669','#d97706','#7c3aed','#db2777','#0891b2','#ca8a04','#4f46e5','#c026d3','#0d9488','#b45309','#1d4ed8','#e11d48','#047857','#a16207','#9333ea','#0284c7','#65a30d','#0f766e'];

var data=loadData();
var activeId=localStorage.getItem(KEY+'_a')||null;
var collapseOpen=(!data.people||data.people.length===0);

function loadData(){
  try{
    var r=localStorage.getItem(KEY);
    if(r){var d=JSON.parse(r);if(d&&d.people){for(var i=0;i<d.people.length;i++)if(!d.people[i].leave)d.people[i].leave=[];return d}}
  }catch(e){}
  var t=new Date();return{people:[],year:t.getFullYear(),month:t.getMonth()};
}
function save(){try{localStorage.setItem(KEY,JSON.stringify({people:data.people,year:data.year,month:data.month}))}catch(e){}}
function genId(){return'p'+Date.now()+Math.random().toString(36).slice(2,6)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ds(y,m,d){return y+'-'+((m+1)+'').padStart(2,'0')+'-'+(d+'').padStart(2,'0')}
function im(y,m,d){return new Date(y,m,d).getDay()===1}
function ip(y,m,d){var t=new Date();t.setHours(0,0,0,0);return new Date(y,m,d)<t}
function dim(y,m){return new Date(y,m+1,0).getDate()}

function gp(id){if(!data.people)return null;for(var i=0;i<data.people.length;i++)if(data.people[i].id===id)return data.people[i];return null}
function ga(){return gp(activeId)}
function pod(ds){var r=[];if(!data.people)return r;for(var i=0;i<data.people.length;i++){var p=data.people[i];if(p.leave)for(var j=0;j<p.leave.length;j++)if(p.leave[j]===ds){r.push(p);break}}return r}
function cod(ds){return pod(ds).length}

function addPerson(){
  var inp=document.getElementById('pi');
  var name=(inp.value||'').trim();
  if(!name||(data.people&&data.people.length>=50))return;
  if(!data.people)data.people=[];
  data.people.push({id:genId(),name:name,color:COLS[data.people.length%COLS.length],leave:[]});
  activeId=data.people[data.people.length-1].id;
  localStorage.setItem(KEY+'_a',activeId);
  inp.value='';save();render();
  // 自动关闭添加框
  if(!data.people||data.people.length>0){collapseOpen=false;document.getElementById('addbox').className='cb2';document.getElementById('addar').className='ar';}
}
function removePerson(id){
  if(!data.people)return;
  var idx=-1;for(var i=0;i<data.people.length;i++)if(data.people[i].id===id){idx=i;break}
  if(idx>-1)data.people.splice(idx,1);
  if(activeId===id){activeId=data.people.length>0?data.people[0].id:null;localStorage.setItem(KEY+'_a',activeId||'')}
  save();render();
}
function toggleLeave(pid,ds){
  var p=gp(pid);if(!p)return;
  if(!p.leave)p.leave=[];
  var idx=-1;for(var i=0;i<p.leave.length;i++)if(p.leave[i]===ds){idx=i;break}
  if(idx>=0)p.leave.splice(idx,1);
  else{p.leave.push(ds)}
  save();render();
}
function toggleAdd(){
  collapseOpen=!collapseOpen;
  document.getElementById('addbox').className='cb2'+(collapseOpen?' op':'');
  document.getElementById('addar').className='ar'+(collapseOpen?' op':'');
}

function shareData(){
  var txt=JSON.stringify({people:data.people||[],year:data.year,month:data.month});
  try{
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){alert('✅ 已复制到剪贴板，请到群里粘贴！')})['catch'](function(){prompt('📋 请复制下面内容发到群里：',txt)})}
    else{prompt('📋 请复制下面内容发到群里：',txt)}
  }catch(e){prompt('📋 请复制下面内容发到群里：',txt)}
}
function importData(){
  var txt=prompt('📥 请粘贴同事分享的数据：');
  if(!txt)return;
  try{
    var d=JSON.parse(txt);
    if(!d||!d.people||!Array.isArray(d.people)){alert('❌ 数据格式不对');return}
    data.people=d.people;
    data.year=d.year||(new Date()).getFullYear();
    data.month=d.month!==undefined?d.month:(new Date()).getMonth();
    for(var i=0;i<data.people.length;i++)if(!data.people[i].leave)data.people[i].leave=[];
    activeId=null;localStorage.setItem(KEY+'_a','');
    save();render();
    alert('✅ 导入成功！共 '+data.people.length+' 人');
  }catch(e){alert('❌ 数据格式不对，请检查')}
}

function goMonth(n){
  data.month+=n;
  if(data.month<0){data.month=11;data.year--}
  if(data.month>11){data.month=0;data.year++}
  save();render();
}
function goToday(){
  var t=new Date();data.year=t.getFullYear();data.month=t.getMonth();save();render();
}
document.onkeydown=function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowLeft')goMonth(-1);
  if(e.key==='ArrowRight')goMonth(1);
};

function render(){
  var py=data.people||[];
  document.getElementById('pcnt').textContent=py.length+' 人';

  // 成员条
  var pb=document.getElementById('pbar');
  if(py.length===0){pb.innerHTML='<div class="eb">暂无成员，点「+ 添加成员」录入</div>'}
  else{
    var h='';
    for(var i=0;i<py.length;i++){
      var p=py[i];
      h+='<div class="pc'+(p.id===activeId?' act':'')+'" style="--c:'+p.color+'" onclick="selectPerson(\''+p.id+'\')">';
      h+='<span class="d" style="background:'+p.color+'"></span>';
      h+='<span class="n">'+esc(p.name)+'</span>';
      h+='<span class="l">'+(p.leave?p.leave.length:0)+'</span>';
      h+='<span class="x" onclick="event.stopPropagation();removePerson(\''+p.id+'\')">✕</span></div>';
    }
    pb.innerHTML=h;
  }

  // 日历
  var y=data.year||(new Date()).getFullYear();
  var m=data.month!==undefined?data.month:(new Date()).getMonth();
  var days=dim(y,m);
  var first=new Date(y,m,1).getDay();
  var sc=first===0?6:first-1;
  document.getElementById('mt').textContent=y+' 年 '+(m+1)+' 月';
  var rows=Math.ceil((sc+days)/7),chtml='';
  for(var r=0;r<rows;r++){
    chtml+='<tr>';
    for(var c=0;c<7;c++){
      var d=r*7+c-sc+1;
      if(d<1||d>days){chtml+='<td class="om"><div class="cell"><div class="dt"> </div></div></td>';continue}
      var str=ds(y,m,d),mon=im(y,m,d),past=ip(y,m,d),ac=ga(),ols=pod(str),cnt=ols.length;
      var me=false;if(ac&&ac.leave)for(var k=0;k<ac.leave.length;k++)if(ac.leave[k]===str){me=true;break}
      var cl='cell';
      if(mon||past)cl+=' dis';
      else if(ac)cl+=' ok';
      var nh='';
      for(var k=0;k<ols.length&&k<3;k++)nh+='<span class="nt" style="background:'+ols[k].color+'">'+esc(ols[k].name)+'</span>';
      if(ols.length>3)nh+='<span class="nt" style="background:transparent;color:#64748b;font-weight:700">+'+(ols.length-3)+'</span>';
      var badge=mon?'':'<span class="cb'+(cnt>=3?' f':'')+'">'+cnt+'/3</span>';
      var dot=me?'<div class="ad" style="background:'+ac.color+'"></div>':'';
      var mtxt=mon?'<div class="mt">🚫 禁休</div>':'';
      chtml+='<td onclick="clickDate(\''+str+'\')"><div class="'+cl+'"><div class="dt">'+d+'</div>'+mtxt+'<div class="nw">'+nh+'</div>'+badge+dot+'</div></td>';
    }
    chtml+='</tr>';
  }
  document.getElementById('calb').innerHTML=chtml;

  // 提示
  var ac2=ga();
  if(ac2)document.getElementById('hint').innerHTML='当前：<strong>'+esc(ac2.name)+'</strong> — 点击日期安排/取消（已休'+(ac2.leave?ac2.leave.length:0)+'天）';
  else if(py.length>0)document.getElementById('hint').innerHTML='请点击下方成员选中后，再点日期安排调休';
  else document.getElementById('hint').innerHTML='展开「+ 添加成员」录入成员';
}

function selectPerson(id){
  activeId=id;localStorage.setItem(KEY+'_a',id);render();
}
function clickDate(str){
  var ac=ga();
  if(!ac){showTip(event&&event.target?event.target:document.getElementById('calb'),'请先点选成员');return}
  var parts=str.split('-').map(Number);
  if(im(parts[0],parts[1]-1,parts[2])){showTip(event.target,'周一禁休');return}
  if(ip(parts[0],parts[1]-1,parts[2])){showTip(event.target,'已过日期不可修改');return}
  var me=false;if(ac.leave)for(var k=0;k<ac.leave.length;k++)if(ac.leave[k]===str){me=true;break}
  if(!me&&cod(str)>=3){showTip(event.target,'已达上限3人');return}
  toggleLeave(ac.id,str);
}

var tipTimer=null;
function showTip(el,msg){
  var t=document.getElementById('tip');
  t.textContent=msg;t.style.display='block';
  var r=el.getBoundingClientRect();
  t.style.left=(r.left+r.width/2)+'px';t.style.top=(r.top-10)+'px';
  t.style.transform='translate(-50%,-100%)';
  clearTimeout(tipTimer);tipTimer=setTimeout(function(){t.style.display='none'},1800);
}

render();
// 如果没成员，展开添加框
if(!data.people||data.people.length===0){
  document.getElementById('addbox').className='cb2 op';
  document.getElementById('addar').className='ar op';
}
</script>
</body>
</html>
